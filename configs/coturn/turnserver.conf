# ============================================================
# Coturn TURN Server Configuration
# WebRTC NAT traversal for LiveKit voice streaming
# ============================================================

# Network
listening-port=3478
tls-listening-port=5349
min-port=49152
max-port=49252

# External IP (replace in .env or set directly)
external-ip=5.189.131.48

# Domain
realm=turn.iamazim.com
server-name=turn.iamazim.com

# Authentication
use-auth-secret
static-auth-secret=${TURN_SECRET}

# TLS certificates (mounted from host)
cert=/etc/coturn/certs/fullchain.pem
pkey=/etc/coturn/certs/privkey.pem

# Logging
log-file=stdout
verbose

# Security
no-multicast-peers
no-cli
fingerprint

# Deny private IPs for relay
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# Quota
total-quota=100
stale-nonce=600
