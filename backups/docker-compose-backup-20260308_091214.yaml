  minio:
    command:
      - server
      - /data
      - --console-address
      - :9001
    container_name: minio
    environment:
      MINIO_API_CORS_ALLOW_ORIGIN: '*'
      MINIO_ROOT_PASSWORD: vxzTY3DP35ihRRv0C0uCQCmY2jdNBsw
      MINIO_ROOT_USER: minioadmin
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:9000/minio/health/live
      timeout: 5s
      interval: 10s
      retries: 5
    image: minio/minio
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 10m
    networks:
      app-network: null
    restart: always
    volumes:
      - type: volume
        source: minio-data
        target: /data
        volume: {}
  postgres:
    container_name: ai-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: 3UTioVfpNwVgcZ2VtlEr9XDR5C8PSOb
      POSTGRES_USER: postgres
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres
      timeout: 3s
      interval: 3s
      retries: 10
    image: pgvector/pgvector:pg17
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 10m
    networks:
      app-network: null
    restart: always
    volumes:
      - type: volume
        source: postgres_data
        target: /var/lib/postgresql/data
        volume: {}
  redis:
    command:
      - --requirepass
      - UuhN4ehSgOTbeDlLltEnJ8R2tYQa8F
    container_name: ai-redis
    healthcheck:
      test:
        - CMD
        - redis-cli
        - -a
        - UuhN4ehSgOTbeDlLltEnJ8R2tYQa8F
        - ping
      timeout: 10s
      interval: 3s
      retries: 10
    image: redis:7
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 10m
    networks:
      app-network: null
    restart: always
    volumes:
      - type: volume
        source: redis_data
        target: /data
        volume: {}
  ui:
    command: []
    container_name: dograh-ui
    depends_on:
      api:
        condition: service_healthy
        required: true
    entrypoint:
      - /bin/sh
      - /app/scripts/ui-entrypoint.sh
    environment:
      BACKEND_API_ENDPOINT: https://api.iamazim.com
      BACKEND_URL: http://api:8000
      ENABLE_TELEMETRY: "false"
      HOSTNAME: 0.0.0.0
      NODE_ENV: oss
      PORT: "3010"
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:3010 || exit 1
      timeout: 10s
      interval: 30s
      retries: 3
      start_period: 30s
    image: ghcr.io/dograh-hq/dograh-ui:latest
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 10m
    networks:
      app-network: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 3010
        published: "3010"
        protocol: tcp
    restart: always
    volumes:
      - type: bind
        source: /home/azim/ai-call-platform/scripts/ui-entrypoint.sh
        target: /app/scripts/ui-entrypoint.sh
        read_only: true
        bind: {}
networks:
  app-network:
    name: ai-call-platform_app-network
    driver: bridge
volumes:
  minio-data:
    name: ai-call-platform_minio-data
    driver: local
  postgres_data:
    name: ai-call-platform_postgres_data
  redis_data:
    name: ai-call-platform_redis_data
  shared-tmp:
    name: ai-call-platform_shared-tmp
    driver: local
