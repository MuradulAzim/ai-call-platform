name: ai-call-platform
services:
  api:
    container_name: dograh-api
    depends_on:
      livekit:
        condition: service_healthy
        required: true
      minio:
        condition: service_healthy
        required: true
      postgres:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
      BACKEND_API_ENDPOINT: https://api.iamazim.com
      DATABASE_URL: postgresql+asyncpg://postgres:3UTioVfpNwVgcZ2VtlEr9XDR5C8PSOb@postgres:5432/postgres
      ENABLE_AWS_S3: "false"
      ENABLE_TRACING: "false"
      ENVIRONMENT: production
      FASTAPI_WORKERS: "2"
      LIVEKIT_API_KEY: API88f0aec95c61
      LIVEKIT_API_SECRET: tvHZFR0IImCbKcDgi19rRrqTMXCTzKiKrRzL1SkQqqc2nakB
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_WS_URL: wss://livekit.iamazim.com
      LOG_LEVEL: INFO
      MINIO_ACCESS_KEY: minioadmin
      MINIO_BUCKET: voice-audio
      MINIO_ENDPOINT: minio:9000
      MINIO_SECRET_KEY: vxzTY3DP35ihRRv0C0uCQCmY2jdNBsw
      MINIO_SECURE: "false"
      OSS_JWT_SECRET: NBRk0559CseXlnGVMPCBxH3rD4YWbYmMjqClB4TVVJviThAg
      REDIS_URL: redis://:UuhN4ehSgOTbeDlLltEnJ8R2tYQa8F@redis:6379
      TURN_HOST: turn.iamazim.com
      TURN_SECRET: T7Gni2xwbHWPWMjDiLG2599xCiZbMjwJ
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health').read()"
      timeout: 10s
      interval: 30s
      retries: 3
      start_period: 1m0s
    image: ghcr.io/dograh-hq/dograh-api:latest
    logging:
      driver: json-file
      options:
        max-file: "5"
        max-size: 10m
    networks:
      app-network: null
    ports:
      - mode: ingress
        host_ip: 127.0.0.1
        target: 8000
        published: "8000"
        protocol: tcp
    restart: always
    volumes:
      - type: volume
        source: shared-tmp
        target: /tmp
        volume: {}
      - type: bind
        source: /home/azim/ai-call-platform/personality
        target: /app/personality
        read_only: true
        bind: {}
  cloudflared:
    command:
      - tunnel
      - --no-autoupdate
      - --url
      - http://api:8000
      - --metrics
      - 0.0.0.0:2000
    container_name: cloudflared-tunnel
    image: cloudflare/cloudflared:latest
    logging:
      driver: json-file
      options:
        max-file: "2"
        max-size: 5m
    networks:
      app-network: null
    restart: always
  coturn:
    command: []
    container_name: coturn
    entrypoint:
      - /bin/sh
      - /etc/coturn-entrypoint.sh
