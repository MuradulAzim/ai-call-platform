# ============================================================
# Fazle Personal AI System — All Fazle Services
# WhatsApp-first business platform with AI intelligence layer
# ============================================================
# DEPLOY ORDER: 3 (start AFTER ai-infra)
# Usage: docker compose --env-file ../.env up -d
# ============================================================
# Phase 8.1: Voice services (fazle-voice) moved to "voice" profile.
# To re-enable voice: docker compose --env-file ../.env --profile voice up -d
# ============================================================

services:
  # ── Fazle API Gateway ──────────────────────────────────────
  fazle-api:
    build: ../fazle-system/api
    container_name: fazle-api
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      FAZLE_API_KEY: "${FAZLE_API_KEY:?FAZLE_API_KEY not set}"
      FAZLE_JWT_SECRET: "${FAZLE_JWT_SECRET:?FAZLE_JWT_SECRET not set}"
      FAZLE_DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}@postgres:5432/${POSTGRES_DB:-postgres}"
      FAZLE_BRAIN_URL: "http://fazle-brain:8200"
      FAZLE_MEMORY_URL: "http://fazle-memory:8300"
      FAZLE_TASK_URL: "http://fazle-api:8100"
      FAZLE_TOOLS_URL: "http://fazle-tool-engine:9200"
      # Deprecated service URLs removed with container cleanup.
      FAZLE_TRAINER_URL: ""
      # LiveKit (disabled � voice profile only)
      FAZLE_LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:-}"
      FAZLE_LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:-}"
      FAZLE_LIVEKIT_URL: "${FAZLE_LIVEKIT_URL:-}"
      FAZLE_LEARNING_ENGINE_URL: "http://fazle-learning-engine:8900"
      # Phase-5 Autonomous AI services
      FAZLE_AUTONOMY_ENGINE_URL: "http://fazle-autonomy-engine:9100"
      FAZLE_TOOL_ENGINE_URL: "http://fazle-tool-engine:9200"
      FAZLE_KNOWLEDGE_GRAPH_URL: "http://fazle-brain:8200"
      FAZLE_AUTONOMOUS_RUNNER_URL: "http://fazle-autonomy-engine:9100"
      FAZLE_SELF_LEARNING_URL: ""
      FAZLE_GUARDRAIL_URL: ""
      FAZLE_WORKFLOW_ENGINE_URL: "http://fazle-workflow-engine:9700"
      FAZLE_SOCIAL_ENGINE_URL: "http://fazle-social-engine:9800"
      FAZLE_WBOM_URL: "http://fazle-wbom:9900"
      FAZLE_WBOM_INTERNAL_KEY: "${WBOM_INTERNAL_KEY:-}"
      FAZLE_REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@redis:6379/7"
      FAZLE_RATE_LIMIT_RPM: "${FAZLE_RATE_LIMIT_RPM:-120}"
      FAZLE_RATE_LIMIT_PER_IP_RPS: "${FAZLE_RATE_LIMIT_PER_IP_RPS:-10}"
      # Vision + MinIO
      FAZLE_OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      FAZLE_MINIO_ENDPOINT: "minio:9000"
      FAZLE_MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-}"
      FAZLE_MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-}"
      FAZLE_MINIO_BUCKET: "fazle-multimodal"
      ELEVENLABS_API_KEY: "${ELEVENLABS_API_KEY:-}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 128M
    ports:
      - "127.0.0.1:8100:8100"
      - "127.0.0.1:8101:8100"
    depends_on:
      fazle-brain:
        condition: service_healthy
      fazle-memory:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8100/health').read()\""]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s
    networks:
      - app-network
      - ai-network
      - db-network

  # ── Fazle Brain — Core Reasoning + LLM Engine ───────────────
  # Merged: LLM Gateway routing, caching, fallback, logging
  fazle-brain:
    build: ../fazle-system/brain
    container_name: fazle-brain
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OLLAMA_URL: "http://ollama:11434"
      LLM_PROVIDER: "${FAZLE_LLM_PROVIDER:-ollama}"
      LLM_MODEL: "${FAZLE_LLM_MODEL:-qwen2.5:1.5b}"
      OLLAMA_MODEL: "${FAZLE_OLLAMA_MODEL:-qwen2.5:1.5b}"
      MEMORY_URL: "http://fazle-memory:8300"
      TOOLS_URL: "http://fazle-tool-engine:9200"
      TASK_URL: "http://fazle-api:8100"
      REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@redis:6379/1"
      # LLM Engine settings (merged from llm-gateway)
      LLM_CACHE_REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@redis:6379/3"
      FALLBACK_PROVIDER: "${FAZLE_FALLBACK_PROVIDER:-openai}"
      FALLBACK_MODEL: "${FAZLE_FALLBACK_MODEL:-gpt-4o}"
      OLLAMA_TIMEOUT: "${FAZLE_OLLAMA_TIMEOUT:-30}"
      CACHE_TTL: "${FAZLE_CACHE_TTL:-300}"
      LLM_RATE_LIMIT_RPM: "${FAZLE_RATE_LIMIT_RPM:-60}"
      # Two-tier model routing: simple → 0.5b, complex → 1.5b
      OLLAMA_SIMPLE_MODEL: "${FAZLE_OLLAMA_SIMPLE_MODEL:-qwen2.5:0.5b}"
      OLLAMA_COMPLEX_MODEL: "${FAZLE_OLLAMA_MODEL:-qwen2.5:1.5b}"
      OLLAMA_NUM_CTX: "${FAZLE_OLLAMA_NUM_CTX:-2048}"
      LEARNING_ENGINE_URL: "http://fazle-learning-engine:8900"
      # Phase-5 Autonomous AI services
      AUTONOMY_ENGINE_URL: "http://fazle-autonomy-engine:9100"
      TOOL_ENGINE_URL: "http://fazle-tool-engine:9200"
      KNOWLEDGE_GRAPH_URL: "http://fazle-brain:8200"
      AUTONOMOUS_RUNNER_URL: "http://fazle-autonomy-engine:9100"
      # Voice fast mode & agent system
      VOICE_FAST_MODE: "${FAZLE_VOICE_FAST_MODE:-true}"
      VOICE_OLLAMA_MODEL: "${FAZLE_OLLAMA_MODEL:-qwen2.5:1.5b}"
      VOICE_FAST_MODEL: "${FAZLE_OLLAMA_MODEL:-qwen2.5:1.5b}"
      PERSONA_CACHE_TTL: "${PERSONA_CACHE_TTL:-300}"
      MEMORY_TOP_K: "${MEMORY_TOP_K:-2}"
      FAZLE_DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}@postgres:5432/${POSTGRES_DB:-postgres}"
      WBOM_URL: "http://fazle-wbom:9900"
      WBOM_INTERNAL_KEY: "${WBOM_INTERNAL_KEY:-}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8200/health').read()\""]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s
    networks:
      - ai-network
      - db-network
      - app-network

  # ── Fazle Memory — Vector Memory System ────────────────────
  fazle-memory:
    build: ../fazle-system/memory
    container_name: fazle-memory
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      VECTOR_DB_URL: "http://qdrant:6333"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      EMBEDDING_MODEL: "text-embedding-3-small"
      EMBEDDING_PROVIDER: "ollama"
      EMBEDDING_FALLBACK: "openai"
      COLLECTION_NAME: "fazle_memories"
      MULTIMODAL_COLLECTION: "fazle_memories_multimodal"
      MULTIMODAL_EMBEDDING_DIM: "3072"
      MULTIMODAL_EMBEDDING_MODEL: "text-embedding-3-large"
      # MinIO for presigned URLs
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-}"
      MINIO_BUCKET: "fazle-multimodal"
      # Ollama embedding fallback
      OLLAMA_URL: "http://ollama:11434"
      OLLAMA_EMBEDDING_MODEL: "nomic-embed-text"
      OLLAMA_EMBEDDING_DIM: "768"
      # PostgreSQL for structured knowledge
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8300/health').read()\""]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s
    networks:
      - ai-network
      - db-network
      - app-network

  # ── MERGED: Task Engine now handled by fazle-api
  # Keeps all task CRUD + trigger logic in API and removes separate scheduler container.
  # fazle-task-engine: MERGED INTO API 2026-04-21

  # ── MERGED: Web Intelligence now handled by fazle-tool-engine
  # Saves 512MB RAM + 0.5 CPU by removing separate search/scraping container.
  # fazle-web-intelligence: MERGED INTO TOOL-ENGINE 2026-04-21

  # ── REMOVED: Trainer (overlaps with learning-engine, no unique callers)
  # Saves 512MB RAM + 1 CPU. Learning-engine handles preference extraction.
  # fazle-trainer: REMOVED 2026-04-21

  # ── Fazle Voice Agent — LiveKit-based STT/TTS ─────────────
  fazle-voice:
    profiles: ["voice"]
    build: ../fazle-system/voice
    container_name: fazle-voice
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - /home/azim/piper-voices:/models:ro
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:-}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:-}"
      LIVEKIT_URL: "ws://livekit:7880"
      FAZLE_VOICE_BRAIN_URL: "http://fazle-brain:8200"
      FAZLE_VOICE_TTS_VOICE: "${FAZLE_VOICE_TTS_VOICE:-alloy}"
      FAZLE_VOICE_TTS_ENGINE: "${FAZLE_VOICE_TTS_ENGINE:-piper}"
      FAZLE_VOICE_VOICE_MODEL: "${FAZLE_VOICE_VOICE_MODEL:-en_US-lessac-medium}"
      FAZLE_VOICE_VOICE_MODEL_DIR: "/models"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/1"
      ELEVENLABS_API_KEY: "${ELEVENLABS_API_KEY:-}"
      ELEVENLABS_VOICE_ID: "${ELEVENLABS_VOICE_ID:-}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
        reservations:
          memory: 256M
    depends_on:
      fazle-brain:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, signal; os.kill(1, 0)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network
      - ai-network
      - db-network

  # ── Fazle UI — Next.js Control Dashboard ───────────────────
  fazle-ui:
    build: ../frontend/fazle-dashboard
    container_name: fazle-ui
    restart: unless-stopped
    environment:
      FAZLE_API_URL: "http://fazle-api:8100"
      WBOM_URL: "http://fazle-wbom:9900"
      WBOM_INTERNAL_KEY: "${WBOM_INTERNAL_KEY:-}"
      NEXTAUTH_URL: "${FAZLE_NEXTAUTH_URL:-https://fazle.iamazim.com}"
      NEXTAUTH_SECRET: "${FAZLE_JWT_SECRET:?FAZLE_JWT_SECRET not set}"
      PORT: "3020"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: "production"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    ports:
      - "127.0.0.1:3020:3020"
    depends_on:
      - fazle-api
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3020 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network

  # ── MERGED: LLM Gateway logic now lives inside fazle-brain/llm_engine.py
  # Saves 1GB RAM + 1 CPU + ~50-200ms per LLM call (no HTTP hop).
  # Brain handles Ollama/OpenAI routing, caching, fallback, and logging directly.
  # fazle-llm-gateway: MERGED INTO BRAIN 2026-04-21

  # ── Fazle Learning Engine — Self-Improvement System ───────
  fazle-learning-engine:
    build: ../fazle-system/learning-engine
    container_name: fazle-learning-engine
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}@postgres:5432/${POSTGRES_DB:-postgres}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@redis:6379/4"
      MEMORY_URL: "http://fazle-memory:8300"
      LLM_GATEWAY_URL: "http://fazle-brain:8200"
      TRAINER_URL: "http://fazle-trainer:8600"
      MIN_CONFIDENCE: "0.6"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    depends_on:
      fazle-brain:
        condition: service_healthy
      fazle-memory:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8900/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ai-network
      - app-network
      - db-network

  # ── Fazle Queue — Async Request Queue ─────────────────────
  fazle-queue:
    build: ../fazle-system/queue
    container_name: fazle-queue
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@redis:6379/5"
      STREAM_NAME: "llm_requests"
      RESULT_TTL: "600"
      MAX_STREAM_LEN: "10000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    depends_on:
      fazle-brain:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8810/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ai-network
      - app-network
      - db-network

  # ── Fazle Workers — LLM Request Worker Pool ───────────────
  fazle-workers:
    build: ../fazle-system/workers
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@redis:6379/5"
      STREAM_NAME: "llm_requests"
      CONSUMER_GROUP: "llm_workers"
      LLM_GATEWAY_URL: "http://fazle-brain:8200"
      QUEUE_URL: "http://fazle-queue:8810"
      BATCH_SIZE: "5"
      BLOCK_MS: "2000"
      MAX_RETRIES: "3"
      CLAIM_MIN_IDLE_MS: "60000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M
    depends_on:
      fazle-queue:
        condition: service_healthy
      fazle-brain:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8820/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ai-network
      - app-network
      - db-network

  # ── Phase-5: Autonomy Engine — Goal Decomposition & Planning ──
  fazle-autonomy-engine:
    build: ../fazle-system/autonomy-engine
    container_name: fazle-autonomy-engine
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - ../fazle-system:/source:rw
    environment:
      AUTONOMY_LLM_GATEWAY_URL: "http://fazle-brain:8200"
      AUTONOMY_BRAIN_URL: "http://fazle-brain:8200"
      AUTONOMY_MEMORY_URL: "http://fazle-memory:8300"
      AUTONOMY_TOOLS_URL: "http://fazle-tool-engine:9200"
      AUTONOMY_TOOL_ENGINE_URL: "http://fazle-tool-engine:9200"
      AUTONOMY_KNOWLEDGE_GRAPH_URL: "http://fazle-brain:8200"
      AUTONOMY_REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@redis:6379/6"
      AUTONOMY_BRAIN_REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@redis:6379/1"
      AUTONOMY_MONITOR_ENABLED: "true"
      AUTONOMY_MONITOR_INTERVAL_SECONDS: "300"
      AUTONOMY_AUTO_IMPROVE_ENABLED: "true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    depends_on:
      fazle-brain:
        condition: service_healthy
      fazle-memory:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9100/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ai-network
      - app-network
      - db-network

  # ── Phase-5: Tool Execution Engine — Secure Tool Orchestration ──
  fazle-tool-engine:
    build: ../fazle-system/tool-engine
    container_name: fazle-tool-engine
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      TOOL_ENGINE_LLM_GATEWAY_URL: "http://fazle-brain:8200"
      TOOL_ENGINE_MEMORY_URL: "http://fazle-memory:8300"
      TOOL_ENGINE_SERPER_API_KEY: "${SERPER_API_KEY:-}"
      TOOL_ENGINE_TAVILY_API_KEY: "${TAVILY_API_KEY:-}"
      TOOL_ENGINE_SEARCH_PROVIDER: "${FAZLE_SEARCH_PROVIDER:-serper}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    depends_on:
      fazle-brain:
        condition: service_healthy
      fazle-memory:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9200/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ai-network
      - app-network

  # ── MERGED: Knowledge Graph now handled by fazle-brain
  # Saves 512MB RAM + 0.5 CPU by removing separate graph container.
  # fazle-knowledge-graph: MERGED INTO BRAIN 2026-04-21

  # ── MERGED: Autonomous Task Runner now handled by fazle-autonomy-engine
  # Saves 512MB RAM + 0.5 CPU by removing separate runner container.
  # fazle-autonomous-runner: MERGED INTO AUTONOMY-ENGINE 2026-04-21

  # ── REMOVED: Self-Learning Engine (dead service — no persistence, no callers)
  # Saves 512MB RAM + 0.5 CPU. Functionality covered by learning-engine.
  # fazle-self-learning: REMOVED 2026-04-21

  # ── REMOVED: Guardrail Engine (dead service — policies never loaded, no integration)
  # Saves 256MB RAM + 0.5 CPU. Safety handled by brain/safety.py.
  # fazle-guardrail-engine: REMOVED 2026-04-21

  # ── Fazle Workflow Engine — Multi-step AI Workflows ────────
  fazle-workflow-engine:
    build: ../fazle-system/workflow-engine
    container_name: fazle-workflow-engine
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      WORKFLOW_DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}@postgres:5432/${POSTGRES_DB:-postgres}"
      WORKFLOW_LLM_GATEWAY_URL: "http://fazle-brain:8200"
      WORKFLOW_BRAIN_URL: "http://fazle-brain:8200"
      WORKFLOW_TOOL_ENGINE_URL: "http://fazle-tool-engine:9200"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    depends_on:
      fazle-brain:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9700/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ai-network
      - db-network

  # ── Fazle Social Engine — WhatsApp + Facebook Automation ──
  fazle-social-engine:
    build:
      context: ../fazle-system
      dockerfile: social-engine/Dockerfile
    container_name: fazle-social-engine
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      SOCIAL_DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}@postgres:5432/${POSTGRES_DB:-postgres}"
      SOCIAL_BRAIN_URL: "http://fazle-brain:8200"
      SOCIAL_REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@redis:6379/6"
      SOCIAL_WHATSAPP_API_URL: "${SOCIAL_WHATSAPP_API_URL:-https://graph.facebook.com/v19.0}"
      SOCIAL_WHATSAPP_API_TOKEN: "${SOCIAL_WHATSAPP_API_TOKEN:-}"
      SOCIAL_WHATSAPP_PHONE_NUMBER_ID: "${SOCIAL_WHATSAPP_PHONE_NUMBER_ID:-}"
      SOCIAL_FACEBOOK_PAGE_ACCESS_TOKEN: "${SOCIAL_FACEBOOK_PAGE_ACCESS_TOKEN:-}"
      SOCIAL_FACEBOOK_PAGE_ID: "${SOCIAL_FACEBOOK_PAGE_ID:-}"
      SOCIAL_ENCRYPTION_KEY: "${SOCIAL_ENCRYPTION_KEY:-}"
      SOCIAL_VERIFY_TOKEN: "${SOCIAL_VERIFY_TOKEN:-}"
      SOCIAL_META_APP_SECRET: "${SOCIAL_META_APP_SECRET:-}"
      SOCIAL_WORKFLOW_ENGINE_URL: "http://fazle-workflow-engine:9700"
      SOCIAL_WBOM_URL: "http://fazle-wbom:9900"
      SOCIAL_WBOM_INTERNAL_KEY: "${WBOM_INTERNAL_KEY:-}"
      SOCIAL_OWNER_PHONE: "${SOCIAL_OWNER_PHONE:-}"
      SOCIAL_LEARNING_ENGINE_URL: "http://fazle-learning-engine:8900"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    depends_on:
      fazle-brain:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9800/health').read()\""]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s
    networks:
      - ai-network
      - app-network
      - db-network

  # ── Fazle WBOM — WhatsApp Business Operations Manager ──────
  fazle-wbom:
    build:
      context: ../fazle-system
      dockerfile: wbom/Dockerfile
    container_name: fazle-wbom
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    ports:
      - "127.0.0.1:9900:9900"
    environment:
      WBOM_DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}@postgres:5432/${POSTGRES_DB:-postgres}"
      WBOM_BRAIN_URL: "http://fazle-brain:8200"
      WBOM_REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD not set}@redis:6379/8"
      WBOM_INTERNAL_KEY: "${WBOM_INTERNAL_KEY:-}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    depends_on:
      fazle-brain:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9900/health').read()\""]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s
    networks:
      - ai-network
      - app-network
      - db-network

  # ── REMOVED: OpenTelemetry Collector (redundant with Prometheus + Loki stack)
  # Saves 256MB RAM + 0.5 CPU. Prometheus already handles metrics.
  # fazle-otel-collector: REMOVED 2026-04-21

networks:
  app-network:
    external: true
  db-network:
    external: true
  ai-network:
    external: true
